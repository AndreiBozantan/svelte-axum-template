[server]
host = "127.0.0.1"
port = 3000
log_directives = "debug,tower_http=debug,axum=debug"
env_vars_prefix = "APP" # customizable prefix used for the environment variables that override the values provided in the config file
trusted_proxy = false

[database]
url = "sqlite:data/db.sqlite"
max_connections = 5
min_connections = 2
write_busy_timeout_seconds = 30
store_temp_tables_in_memory = true

[jwt]
access_token_expiry_minutes = 16
refresh_token_expiry_days = 32

[oauth]
# ⚠️ SECURITY WARNING: NEVER commit real OAuth secrets to git!
# Use one of these secure methods instead:
# 1. Environment variables (in .env file): APP__OAUTH__GOOGLE_CLIENT_ID, APP__OAUTH__GOOGLE_CLIENT_SECRET
# 2. Create configs.local.toml (git-ignored)

google_client_id = ""      # ⚠️ LEAVE EMPTY - set in configs.local.toml or via environment variable
google_client_secret = ""  # ⚠️ LEAVE EMPTY - set in configs.local.toml or via environment variable
google_redirect_uri = "http://localhost:3000/api/oauth/google/callback"

# Session timeout for OAuth flow (in minutes)
session_timeout_minutes = 10

# Outbound HTTP client (used for OAuth token exchange and provider userinfo calls)
[http_client]
timeout_seconds = 10         # total request budget: connect + TLS + response body; 0 = no timeout
connect_timeout_seconds = 5  # fail fast when the remote is unreachable; 0 = no timeout

# The rate limiter is backed by the GCRA (Generic Cell Rate Algorithm) token bucket.
# - rate: The number of requests allowed over the configured period.
# - period_in_seconds: The duration in seconds of the measurement period.
# - burst_size: The capacity of the bucket (maximum number of requests allowed in a sudden burst).
#
[rate_limiter]
# Global rate limit settings
global.enabled = true
global.rate = 1000
global.period_in_seconds = 1
global.burst_size = 2000 # Max capacity of 2000 requests, replenishing 1000 requests every 1 second

# Login/Register specific rate limit settings
login.enabled = true
login.rate = 10
login.period_in_seconds = 60 # 10 requests per 60 seconds (1 request every 6 seconds on average)
login.burst_size = 10 # Max capacity of 10 requests, replenishing 10 requests every 60 seconds
