[server]
host = "0.0.0.0"
port = 3000
log_directives = "info,tower_http=warn,axum=warn"
env_vars_prefix = "APP" # customizable prefix used for the environment variables that override the values provided in the config file
trusted_proxy = false

[database]
url = "sqlite:data/db.sqlite"
max_connections = 5
min_connections = 2
write_busy_timeout_seconds = 30
store_temp_tables_in_memory = true

[jwt]
access_token_expiry_minutes = 16
refresh_token_expiry_days = 32

[oauth]
# ⚠️ SECURITY WARNING: NEVER commit real OAuth secrets to git!
# Use one of these secure methods instead:
# 1. Environment variables (in .env file): APP__OAUTH__GOOGLE_CLIENT_ID, APP__OAUTH__GOOGLE_CLIENT_SECRET
# 2. Create configs.local.toml (git-ignored)

google_client_id = ""      # ⚠️ LEAVE EMPTY - set in configs.local.toml or via environment variable
google_client_secret = ""  # ⚠️ LEAVE EMPTY - set in configs.local.toml or via environment variable
google_redirect_uri = ""   # 🚀 add your actual redirect URI here

# Session timeout for OAuth flow (in minutes) - shorter for production
session_timeout_minutes = 5

# Outbound HTTP client (used for OAuth token exchange and provider userinfo calls)
[http_client]
timeout_seconds = 10         # total request budget: connect + TLS + response body; 0 = no timeout
connect_timeout_seconds = 5  # fail fast when the remote is unreachable; 0 = no timeout
