# cargo-audit configuration (https://github.com/rustsec/rustsec/tree/main/cargo-audit)

[advisories]
# RUSTSEC-2023-0071 (rsa "Marvin" timing sidechannel): no fixed upgrade exists.
# rsa is pulled transitively by jsonwebtoken, but this project signs/verifies JWTs
# and OAuth state with HS256 only (see backend/platform/shared/jwt.rs) and never
# performs RSA private-key operations, so the vulnerable code path is unreachable.
ignore = ["RUSTSEC-2023-0071"]
