name: CI Checks

on:
    workflow_dispatch:
    # for manual-only mode: comment out push/pull_request:
    push:
        branches: [main]
        paths-ignore:
            - "*.md"
            - "docs/**"
            - "LICENSE"
    pull_request:
        branches: [main]
        paths-ignore:
            - "*.md"
            - "docs/**"
            - "LICENSE"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    backend-checks:
        name: Backend (Rust)
        runs-on: ubuntu-latest
        timeout-minutes: 15
        env:
            SQLX_OFFLINE: true
            RUSTC_WRAPPER: "" # bypasses sccache
        steps:
            - uses: actions/checkout@v7

            - name: Create placeholder frontend dist directory
              # mock frontend/dist for rust-embed so backend compiles & tests pass in CI
              # without needing to install Node.js/NPM and do a frontend build.
              run: |
                  mkdir -p frontend/dist/static
                  echo "<html><body>test placeholder for compression</body></html>" > frontend/dist/index.html
                  touch frontend/dist/favicon.ico
                  touch frontend/dist/static/placeholder.js

            - name: Install system dependencies
              run: sudo apt-get update && sudo apt-get install -y lld

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@c0e9df88980754dd93e5833b8dcb1b304c1fe173 # 1.96.0
              with:
                  components: clippy, rustfmt

            - name: Cache Cargo dependencies
              uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

            - name: Run all backend checks
              run: cargo xtask check backend

    frontend-checks:
        name: Frontend (Svelte)
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v7

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: frontend

            - name: Run all frontend checks
              run: cargo xtask check frontend
              env:
                  RUSTC_WRAPPER: "" # bypasses sccache for compiling xtask
                  RUSTFLAGS: "-C linker=cc" # override repository-level config, to compile the xtask with the cc linker - avoids installing lld
